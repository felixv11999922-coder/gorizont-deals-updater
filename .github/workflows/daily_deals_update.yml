name: Daily deals update

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * *"

jobs:
  update-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Start deals update on VPS
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            cd /root/gorizont_bot &&
            systemctl start gorizont_deals_update.service &&
            sleep 5 &&
            journalctl -u gorizont_deals_update.service -n 80 --no-pager
          "
