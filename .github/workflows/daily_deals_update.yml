name: Daily deals update

on:
  workflow_dispatch:
  schedule:
    - cron: "20 4 * * *"

jobs:
  update-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Create test CSV
        run: |
          cat > deals_latest.csv <<'CSV'
          кадастровый квартал;тип сделки;год;квартал сделки;адрес;ври;площадь;цена;тип договора
          71:22:010412;sale;2024;4;ул. Глеба Успенского;Для ведения личного подсобного хозяйства;3935;3500000;ДКП
          71:22:010412;sale;2024;4;ул. Шоссейная;Для ведения личного подсобного хозяйства;7009;300000;ДКП
          71:22:010412;sale;2025;1;не указана;Для ведения личного подсобного хозяйства;4029;500000;ДКП
          71:22:010412;sale;2025;3;ул. Парковая;Для ведения личного подсобного хозяйства;9167;4950000;ДКП
          71:22:010412;rent;2025;4;не указана;Для ведения личного подсобного хозяйства;3877;68500;Договор аренды
          71:22:010412;rent;2025;4;не указана;Для ведения личного подсобного хозяйства;2881;54200;Договор аренды
          CSV

          sed -i 's/^          //' deals_latest.csv

      - name: Upload CSV to VPS
        run: |
          scp deals_latest.csv "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/gorizont_bot/deals_imports/deals_latest.csv"

      - name: Import CSV on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "cd /root/gorizont_bot && /root/gorizont_bot/venv/bin/python update_deals.py --local /root/gorizont_bot/deals_imports/deals_latest.csv"
