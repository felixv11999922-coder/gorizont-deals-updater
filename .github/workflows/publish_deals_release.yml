name: Publish deals_latest release

on:
  workflow_dispatch:
    inputs:
      min_rows:
        description: "Minimum rows required before publishing"
        required: true
        default: "10"
  push:
    branches:
      - main
    paths:
      - "data/deals_source.csv"
      - "data/deals_latest.csv"
      - "scripts/build_deals_release.py"
      - ".github/workflows/publish_deals_release.yml"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deals_latest.csv.gz
        env:
          MIN_DEALS_ROWS: ${{ github.event.inputs.min_rows || '10' }}
        run: |
          python3 scripts/build_deals_release.py
          ls -lh data/deals_latest.csv data/deals_latest.csv.gz
          echo
          echo "First lines:"
          zcat data/deals_latest.csv.gz | head -n 5

      - name: Publish GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: deals-latest
          name: deals-latest
          body: |
            Автоматически собранный файл сделок для Земельный Горизонт PRO.

            Файл:
            - deals_latest.csv.gz
          files: |
            data/deals_latest.csv.gz
            data/deals_latest.csv
          make_latest: true
          fail_on_unmatched_files: true
