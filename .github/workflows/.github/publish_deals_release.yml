name: Publish deals database release

on:
  workflow_dispatch:
  push:
    paths:
      - "data/deals_latest.csv"
      - ".github/workflows/publish_deals_release.yml"
  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check source file
        run: |
          test -f data/deals_latest.csv
          echo "Source file:"
          ls -lh data/deals_latest.csv
          echo "First rows:"
          head -n 5 data/deals_latest.csv

      - name: Build compressed database
        run: |
          mkdir -p release
          cp data/deals_latest.csv release/deals_latest.csv
          gzip -c data/deals_latest.csv > release/deals_latest.csv.gz
          echo "Release files:"
          ls -lh release

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view deals-latest >/dev/null 2>&1; then
            gh release upload deals-latest release/deals_latest.csv release/deals_latest.csv.gz --clobber
          else
            gh release create deals-latest release/deals_latest.csv release/deals_latest.csv.gz \
              --title "Latest deals database" \
              --notes "Автоматически опубликованная база сделок"
          fi
