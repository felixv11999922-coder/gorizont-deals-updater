name: Test VPS connection

on:
  workflow_dispatch:

jobs:
  test-vps:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Connect to VPS and create test file
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
          set -e
          echo "GitHub connected successfully at $(date)" > /root/gorizont_bot/github_test.txt
          ls -la /root/gorizont_bot/github_test.txt
          cat /root/gorizont_bot/github_test.txt
          EOF
